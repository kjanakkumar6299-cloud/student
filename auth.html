<!DOCTYPE html>
<html>
<head>
  <title>Auth Page</title>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: url('/bg.jpg') no-repeat center center;
      background-size: cover;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* Glass Card */
    .card {
      /*background: rgba(255, 255, 255, 0.1);*/
      backdrop-filter: blur(15px);
      border-radius: 20px;
      padding: 40px;
      width: 350px;
      text-align: center;
      box-shadow: 0 5px 15px rgba(19, 237, 230, 0.929);
      border: 1px solid rgba(255,255,255,0.2);
      animation: fadeIn 1s ease-in-out;
    }

    /* Heading */
    h2 {
      color: white;
      margin-bottom: 20px;
    }

    /* Input Fields */
    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 10px;
      border: none;
      outline: none;
      background: rgba(255,255,255,0.1);
      color: white;
      font-size: 14px;
    }

    input::placeholder {
      color: #ccc;
    }

    /* Placeholder color */
    input::placeholder {
      color: #ddd;
    }

    button {
      margin-left: 10px;
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      background: linear-gradient(45deg, #00f2fe, #4facfe);
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-size: 15px;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.05);
      background: linear-gradient(45deg, #4facfe, #00f2fe);
    }

    /* Links */
    .toggle {
      margin-top: 12px;
      color: #fff;
      cursor: pointer;
      font-size: 14px;
    }

    .toggle:hover {
      text-decoration: underline;
    }

    /* Animation */
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>

  <script>
    function showSignup() {
      document.getElementById("loginForm").style.display = "none";
      document.getElementById("forgotForm").style.display = "none";
      document.getElementById("signupForm").style.display = "block";
    }

    function showLogin() {
      document.getElementById("signupForm").style.display = "none";
      document.getElementById("forgotForm").style.display = "none";
      document.getElementById("loginForm").style.display = "block";
    }

    function showForgot() {
      document.getElementById("loginForm").style.display = "none";
      document.getElementById("signupForm").style.display = "none";
      document.getElementById("forgotForm").style.display = "block";
    }
  </script>
</head>

<body>

<div class="card">

  <!-- LOGIN FORM -->
  <form id="loginForm" action="/login" method="post">
    <h2>Login</h2>
    <input type="email" name="email" placeholder="Email" required>
    <input type="password" name="password" placeholder="Password" required>
    <button type="submit">Login</button>

    <p onclick="showForgot()" style="color:blue;cursor:pointer;">
      Forgot Password?
    </p>

    <p class="toggle" onclick="showSignup()">Don't have account? Sign Up</p>
  </form>

  <!-- SIGNUP FORM -->
  <form id="signupForm" action="/register" method="post" style="display:none;">
    <h2>Sign Up</h2>
    <input type="text" name="name" placeholder="Name" required>
    <input type="email" name="email" placeholder="Email" required>
    <input type="password" name="password" placeholder="Password" required>
    <button type="submit">Sign Up</button>

    <p class="toggle" onclick="showLogin()">Already have account? Login</p>
  </form>

  <!-- 🔥 FORGOT PASSWORD FORM -->
  <form id="forgotForm" action="/forgot" method="post" style="display:none;">
    <h2>Reset Password</h2>
    <input type="email" name="email" placeholder="Email" required>
    <input type="password" name="newPassword" placeholder="New Password" required>
    <button type="submit">Reset Password</button>

    <p class="toggle" onclick="showLogin()">Back to Login</p>
  </form>

</div>

</body>
</html>
